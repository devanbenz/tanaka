{{define "content"}}
<div class="window" style="max-width:640px">
  <div class="title-bar"><div class="title-bar-text">Tanaka - Sources</div></div>
  <div class="window-body">
    {{if not .Sources}}
      <p>No sources yet. Add one from the CLI: <code>tanaka add &lt;file|url|-&gt;</code></p>
    {{else}}
    <ul class="tree-view">
      {{range .Sources}}
      <li><a href="/study/{{.ID}}">{{.Title}}</a> &mdash; {{.Done}}/{{.Total}} &middot; <a href="/build/{{.ID}}">build</a> &middot; <a href="/export/{{.ID}}">export</a></li>
      {{end}}
    </ul>
    {{end}}
    <hr>
    <form action="/import" method="post" enctype="multipart/form-data">
      <label for="sheet">Import a sheet:</label>
      <input type="file" id="sheet" name="sheet" accept=".tanaka" required>
      <button type="submit">Import</button>
    </form>
  </div>
</div>
{{end}}
